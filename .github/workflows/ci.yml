name: CityPulse CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend
      
    - name: Type Check & Lint
      run: npm run lint
      working-directory: ./frontend
      
    - name: Build Next.js
      run: npm run build
      working-directory: ./frontend
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:54321' }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy_anon_key' }}

  python-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      working-directory: ./backend
      
    - name: Check code formatting with Black
      run: |
        pip install black
        black --check .
      working-directory: ./backend

    - name: Smoke check — config loads
      run: python -c "from backend.config import settings; print('Settings loaded OK')"
      env:
        SUPABASE_URL: http://localhost:54321
        SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
        GEMINI_API_KEY: test-gemini-key

    - name: Run backend tests
      run: python -m pytest backend/tests -q
